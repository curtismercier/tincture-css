<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <defs>
    <style>
      .mono { font: 11px/1.6 'SF Mono', 'Fira Code', monospace; }
      .head { font: 12px/1 'SF Mono', 'Fira Code', monospace; font-weight: 700; fill: #fff; }
      .dim  { fill: rgba(255,255,255,0.35); }
      .acc  { fill: #E82E11; }
      .grn  { fill: #4ade80; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,255,255,0.3)"/>
    </marker>
  </defs>
  <rect width="720" height="200" fill="#0D1017" rx="12"/>

  <!-- baseline -->
  <rect x="20" y="20" width="200" height="160" rx="8" fill="#12151C" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="36" y="44" class="head">baseline</text>
  <rect x="36" y="56" width="60" height="16" rx="3" fill="#C2200E"/>
  <text x="104" y="68" class="mono dim">--accent</text>
  <text x="36" y="94" class="mono dim">weight-display: </text><text x="150" y="94" class="mono" fill="#fff">700</text>
  <text x="36" y="114" class="mono dim">type-display-1:</text>
  <text x="36" y="130" class="mono dim" style="font-size:9px">clamp(3rem, 7vw, 5rem)</text>
  <text x="36" y="158" class="mono dim" style="font-size:9px">shadow: 0 4px 16px …</text>

  <!-- arrow 1 -->
  <line x1="226" y1="100" x2="278" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="234" y="92" class="mono dim" style="font-size:9px">mood apply</text>
  <text x="232" y="116" class="mono acc" style="font-size:10px;font-weight:700">performance</text>

  <!-- performance -->
  <rect x="284" y="20" width="200" height="160" rx="8" fill="#12151C" stroke="#E82E11" stroke-width="1" stroke-opacity="0.4"/>
  <text x="300" y="44" class="head">performance</text>
  <rect x="300" y="56" width="60" height="16" rx="3" fill="#FF3A1A"/>
  <text x="368" y="68" class="mono grn" style="font-size:9px">▲ vivid</text>
  <text x="300" y="94" class="mono dim">weight-display: </text><text x="414" y="94" class="mono grn">900</text>
  <text x="300" y="114" class="mono dim">type-display-1:</text>
  <text x="300" y="130" class="mono grn" style="font-size:9px">clamp(3rem, 8vw, 6rem) ▲</text>
  <text x="300" y="158" class="mono grn" style="font-size:9px">shadow: dramatic ▲</text>

  <!-- arrow 2 -->
  <line x1="490" y1="100" x2="542" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="498" y="92" class="mono dim" style="font-size:9px">mood apply</text>
  <text x="492" y="116" class="mono" fill="#93c5fd" style="font-size:10px;font-weight:700">minimalist-quiet</text>

  <!-- quiet -->
  <rect x="548" y="20" width="152" height="160" rx="8" fill="#12151C" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="564" y="44" class="head">quiet</text>
  <rect x="564" y="56" width="60" height="16" rx="3" fill="#8B5A4A" opacity="0.5"/>
  <text x="634" y="68" class="mono" fill="#93c5fd" style="font-size:9px">▼ soft</text>
  <text x="564" y="94" class="mono dim">weight: </text><text x="618" y="94" class="mono" fill="#93c5fd">300</text>
  <text x="564" y="114" class="mono" fill="#93c5fd" style="font-size:9px">lighter, wider</text>
  <text x="564" y="140" class="mono dim" style="font-size:9px">accent barely</text>
  <text x="564" y="155" class="mono dim" style="font-size:9px">breathes</text>
</svg>
